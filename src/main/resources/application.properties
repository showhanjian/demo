# Server Configuration
server.port=8080

# Spring Boot Banner
spring.main.banner-mode=console

# Static Resources - 改为 web/ 目录（前后端分离准备）
spring.web.resources.static-locations=classpath:/web/
spring.mvc.static-path-pattern=/**

# ==========================================
# 企业级配置 - 线程池
# ==========================================
app.threadpool.core=4
app.threadpool.max=16
app.threadpool.queue=100

# ==========================================
# 企业级配置 - 存储路径
# ==========================================
app.storage.sessions=src/main/resources/sessions_repo
app.storage.skills=src/main/resources/skill_repo
app.storage.system=src/main/resources/system_repo
app.storage.user=src/main/resources/user_repo
